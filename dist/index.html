<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Random Things</title>
  <meta name="description" content="An app for lots of random things, styled with a Windows Vista Aero theme.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Segoe+UI:wght@300;400;600;700&display=swap" rel="stylesheet">
  <script type="module" crossorigin src="/assets/index-CkmnzEih.js"></script>
  <link rel="stylesheet" crossorigin href="/assets/index-D3hmwuDD.css">
</head>
<body>

  <!-- Desktop -->
  <div id="desktop">
    <!-- Desktop Icons -->
    <div id="desktop-icons">
      <!-- Icons are generated by JS -->
    </div>

    <!-- Windows Container -->
    <div id="windows-container"></div>
  </div>

  <!-- Taskbar -->
  <div id="taskbar">
    <button id="start-button">
      <div class="start-orb"></div>
      <span>Start</span>
    </button>

    <div id="taskbar-items"></div>

    <div id="system-tray">
      <span id="clock"></span>
    </div>
  </div>

  <!-- Start Menu -->
  <div id="start-menu" class="hidden">
    <div class="start-menu-top">
      <div class="user-avatar"></div>
      <span class="user-name">User</span>
    </div>
    <div class="start-menu-body">
      <div class="start-menu-left" id="start-menu-apps">
        <!-- Populated by JS -->
      </div>
      <div class="start-menu-right">
        <a href="#" class="start-menu-link" data-action="settings">Control Panel</a>
        <a href="#" class="start-menu-link" data-action="about">About</a>
        <div class="start-menu-separator"></div>
        <a href="#" class="start-menu-link shutdown" data-action="shutdown">Shut Down</a>
      </div>
    </div>
    <div class="start-menu-bottom">
      <div class="search-box">
        <input type="text" placeholder="Search..." id="start-search">
      </div>
    </div>
  </div>

  <!-- Window Template (hidden, cloned by JS) -->
  <template id="window-template">
    <div class="vista-window" tabindex="-1">
      <div class="window-titlebar">
        <div class="window-icon"></div>
        <span class="window-title">Window</span>
        <div class="window-controls">
          <button class="win-btn minimize" title="Minimize">&#x2013;</button>
          <button class="win-btn maximize" title="Maximize">&#x25A1;</button>
          <button class="win-btn close" title="Close">&#x2715;</button>
        </div>
      </div>
      <div class="window-toolbar">
        <!-- Optional toolbar content -->
      </div>
      <div class="window-body">
        <!-- Window content goes here -->
      </div>
      <div class="window-statusbar">
        <span class="status-text">Ready</span>
      </div>
    </div>
  </template>

</body>
</html>
